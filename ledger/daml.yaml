# sdk-version: pinned to the STABLE release Seaport's dpm build env can install (cn-quickstart's
#   DAML_RUNTIME_VERSION). The old 3.3.0-snapshot is an *unstable*-registry nightly Seaport can't
#   fetch → `SDK_NOT_INSTALLED`. 3.5.2 is stable/default-registry, so `dpm install` resolves it.
#   Script lib is `daml-script` on this line; `import Daml.Script` is stable.
sdk-version: 3.5.2
# Renamed from `atrium` → fresh package lineage: the devnet validator has atrium v0.3.0, and our
# 0.4–0.7 schema (non-Optional new Deal fields) is not an SCU-valid upgrade of it. A new name = a
# clean baseline (we reseed the demo anyway). See docs/CBTC_PHASE_B_RUNBOOK / deploy notes.
name: atrium-cm
version: 0.9.0
source: daml
init-script: Atrium.DealRoom:setupDemo
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
